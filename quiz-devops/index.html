<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DevOps Quiz – Docker, K8s, Microservizi</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- INTRO -->
    <div id="intro-screen" class="screen active">
        <div class="intro-card">
            <h1>🐳 DevOps Quiz</h1>
            <p class="subtitle">60 domande su <strong>Docker</strong>, <strong>Immagini</strong>, <strong>Kubernetes</strong> e <strong>Microservizi</strong></p>
            <div class="intro-stats">
                <span>✅ 60 domande a risposta multipla</span>
                <span>⏱ ~30 minuti</span>
                <span>📊 Punteggio finale</span>
            </div>
            <button id="start-btn" class="btn-primary">Inizia Quiz</button>
        </div>
    </div>

    <!-- QUIZ -->
    <div id="quiz-screen" class="screen">
        <div class="quiz-container">
            <header class="quiz-header">
                <div class="progress-info">
                    <span id="question-counter">1 / 60</span>
                    <span id="topic-badge" class="topic-badge">Docker</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar" style="width: 1.6%"></div>
                </div>
            </header>

            <div id="question-card" class="question-card">
                <p id="question-text" class="question-text">Caricamento domanda…</p>
                <div id="answers-container" class="answers-container"></div>
            </div>

            <div class="quiz-footer">
                <button id="prev-btn" class="btn-secondary" disabled>← Precedente</button>
                <span id="flag-btn" class="flag-btn" title="Segnalibro">🔖</span>
                <button id="next-btn" class="btn-primary">Successiva →</button>
            </div>
        </div>
    </div>

    <!-- RESULTS -->
    <div id="results-screen" class="screen">
        <div class="results-card">
            <h1>🏁 Risultato</h1>
            <div class="score-circle">
                <span id="score-percentage">0%</span>
            </div>
            <p id="score-label" class="score-label">Continua a studiare!</p>
            <div class="score-breakdown">
                <div><span>Corrette:</span> <strong id="correct-count">0</strong></div>
                <div><span>Sbagliate:</span> <strong id="wrong-count">0</strong></div>
                <div><span>Non risposte:</span> <strong id="unanswered-count">0</strong></div>
            </div>
            <div class="results-actions">
                <button id="review-btn" class="btn-secondary">📋 Rivedi Risposte</button>
                <button id="restart-btn" class="btn-primary">🔄 Ricomincia</button>
            </div>
        </div>
    </div>

    <!-- REVIEW -->
    <div id="review-screen" class="screen">
        <div class="review-container">
            <h1>📋 Revisione</h1>
            <div id="review-list" class="review-list"></div>
            <button id="back-to-results-btn" class="btn-secondary">← Torna ai risultati</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
